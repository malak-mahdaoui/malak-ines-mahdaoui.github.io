baseURL: "https://malak-mahdaoui.github.io/"
title: "Malak Ines MAHDAOUI | Portfolio"
theme: "toha"

# Configuration des Modules (Indispensable pour le thème)
module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: content
      target: content
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: assets
      target: assets
    - source: i18n
      target: i18n
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

# Gestion des Langues (C'est ici que Toha fait le lien avec ton dossier data/en/)
languages:
  en:
    languageCode: en
    languageName: English
    title: "Malak Ines MAHDAOUI"
    weight: 1

defaultContentLanguage: en

# Paramètres du site
params:
  # Ton identité GitHub
  github_user: "malak-mahdaoui"
  github_repo: "malak-mahdaoui.github.io"
  
  # Image de fond (tu peux la changer plus tard)
  background: /images/site/background.jpg
  
  # Activer les fonctionnalités de Toha
  features:
    theme:
      enable: true
      default: system
    portfolio:
      enable: true
    footer:
      enable: true

# Permettre le HTML dans le Markdown (utile pour certains rendus)
markup:
  goldmark:
    renderer:
      unsafe: true

# Sorties nécessaires pour la recherche et le rendu
outputs:
  home:
    - HTML
    - RSS
    - JSON